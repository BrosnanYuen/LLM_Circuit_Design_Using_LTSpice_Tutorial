axioms:
  bus_voltage:
    equation: "Vd = 380"
  modulation_index:
    equation: "ma = 0.8"
  load_resistance:
    equation: "R = 1"
  load_inductance:
    equation: "L = 0.01"
  fundamental_frequency:
    equation: "f = 160"
  carrier_frequency:
    equation: "fs = 16000"
  phase_voltage:
    equation: "Vphase = ma * Vd / 2"
  line_voltage:
    equation: "VLL = sqrt(3) * Vphase"
  load_impedance:
    equation: "Z1 = sqrt(R^2 + (2 * pi * f * L)^2)"
  phase_current:
    equation: "Iphase = Vphase / Z1"
  load_time_constant:
    equation: "tau = L / R"
  carrier_period:
    equation: "Ts = 1 / fs"
line_voltage_from_phase_voltage:
  equation: |+
    VLL = sqrt(3) * Vphase ; Vphase = ma * Vd / 2 -> VLL = sqrt(3) * (ma * Vd / 2)
calculations:
  phase_voltage_eval:
    vars: ["ma", "Vd"]
    values: [0.8, 380]
    equation: "ma * Vd / 2"
    tolerance: 0.000001
    expected_value: 152.0
    expected_symbol: "Vphase"
  line_voltage_eval:
    vars: ["Vphase"]
    values: [152]
    equation: "sqrt(3) * Vphase"
    tolerance: 0.01
    expected_value: 263.1
    expected_symbol: "VLL"
  impedance_eval:
    vars: ["R", "f", "L"]
    values: [1, 160, 0.01]
    equation: "sqrt(R^2 + (2 * pi * f * L)^2)"
    tolerance: 0.01
    expected_value: 10.099
    expected_symbol: "Z1"
  phase_current_eval:
    vars: ["Vphase", "Z1"]
    values: [152, 10.099]
    equation: "Vphase / Z1"
    tolerance: 0.1
    expected_value: 15.05
    expected_symbol: "Iphase"
  carrier_period_eval:
    vars: ["fs"]
    values: [16000]
    equation: "1 / fs"
    tolerance: 0.000001
    expected_value: 0.0000625
    expected_symbol: "Ts"
  load_time_constant_eval:
    vars: ["L", "R"]
    values: [0.01, 1]
    equation: "L / R"
    tolerance: 0.000001
    expected_value: 0.01
    expected_symbol: "tau"
