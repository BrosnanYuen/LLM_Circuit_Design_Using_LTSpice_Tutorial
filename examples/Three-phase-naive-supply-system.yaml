axioms:
  input_amplitude:
    equation: "Vin = 1"
  input_frequency:
    equation: "f = 18.37"
  opamp_supply_high:
    equation: "Vcc = 3"
  opamp_supply_low:
    equation: "Vee = -3"
  rc_resistance:
    equation: "Rrc = 5000"
  rc_capacitance:
    equation: "C = 0.000001"
  load_resistance:
    equation: "Rload = 2.5"
  load_inductance:
    equation: "Lload = 0.0001205"
  input_period:
    equation: "T = 1 / f"
  rc_corner_frequency:
    equation: "fc = 1 / (2 * pi * Rrc * C)"
  rc_time_constant:
    equation: "tau = Rrc * C"
  load_reactance:
    equation: "XL = 2 * pi * f * Lload"
  branch_current:
    equation: "I = Vin / Rload"
corner_frequency_from_rc:
  equation: |+
    fc = 1 / (2 * pi * Rrc * C) ; Rrc = 5000 -> fc = 1 / (2 * pi * 5000 * C)
calculations:
  input_period_eval:
    vars: ["f"]
    values: [18.37]
    equation: "1 / f"
    tolerance: 0.001
    expected_value: 0.0544
    expected_symbol: "T"
  rc_corner_frequency_eval:
    vars: ["Rrc", "C"]
    values: [5000, 0.000001]
    equation: "1 / (2 * pi * Rrc * C)"
    tolerance: 0.01
    expected_value: 31.83
    expected_symbol: "fc"
  rc_time_constant_eval:
    vars: ["Rrc", "C"]
    values: [5000, 0.000001]
    equation: "Rrc * C"
    tolerance: 0.000001
    expected_value: 0.005
    expected_symbol: "tau"
  load_reactance_eval:
    vars: ["f", "Lload"]
    values: [18.37, 0.0001205]
    equation: "2 * pi * f * Lload"
    tolerance: 0.00001
    expected_value: 0.013908365
    expected_symbol: "XL"
  branch_current_eval:
    vars: ["Vin", "Rload"]
    values: [1, 2.5]
    equation: "Vin / Rload"
    tolerance: 0.000001
    expected_value: 0.4
    expected_symbol: "I"
