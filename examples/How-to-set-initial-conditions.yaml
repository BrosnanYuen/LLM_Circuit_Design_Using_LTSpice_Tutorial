axioms:
  time_constant:
    equation: "tau = R * C"
  capacitor_discharge:
    equation: "V = V0 * exp(-t / tau)"
  ohm_current:
    equation: "I = V / R"
  stored_charge:
    equation: "Q = C * V"
discharge_with_time_constant:
  equation: |+
    V = V0 * exp(-t / tau) ; tau = R * C -> V = V0 * exp(-t / (R * C))
calculations:
  eval_time_constant:
    vars: ["R", "C"]
    values: [1.0, 1.0]
    equation: "R * C"
    tolerance: 0.001
    expected_value: 1.0
    expected_symbol: "tau"
  eval_voltage_t0:
    vars: ["V0", "t", "tau"]
    values: [10.0, 0.0, 1.0]
    equation: "V0 * exp(-t / tau)"
    tolerance: 0.001
    expected_value: 10.0
    expected_symbol: "V"
  eval_voltage_t1:
    vars: ["V0", "t", "tau"]
    values: [10.0, 1.0, 1.0]
    equation: "V0 * exp(-t / tau)"
    tolerance: 0.001
    expected_value: 3.6787944117144233
    expected_symbol: "V"
  eval_voltage_t5:
    vars: ["V0", "t", "tau"]
    values: [10.0, 5.0, 1.0]
    equation: "V0 * exp(-t / tau)"
    tolerance: 0.001
    expected_value: 0.06737946999085467
    expected_symbol: "V"
  eval_current_t0:
    vars: ["V", "R"]
    values: [10.0, 1.0]
    equation: "V / R"
    tolerance: 0.001
    expected_value: 10.0
    expected_symbol: "I"
  eval_current_t1:
    vars: ["V", "R"]
    values: [3.6787944117144233, 1.0]
    equation: "V / R"
    tolerance: 0.001
    expected_value: 3.6787944117144233
    expected_symbol: "I"
  eval_current_t5:
    vars: ["V", "R"]
    values: [0.06737946999085467, 1.0]
    equation: "V / R"
    tolerance: 0.001
    expected_value: 0.06737946999085467
    expected_symbol: "I"
  eval_stored_charge:
    vars: ["C", "V"]
    values: [1.0, 10.0]
    equation: "C * V"
    tolerance: 0.001
    expected_value: 10.0
    expected_symbol: "Q"
